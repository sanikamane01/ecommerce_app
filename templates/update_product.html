<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.2.1/dist/css/bootstrap.min.css"
          crossorigin="anonymous">

    <title>Update Product</title>
</head>
<body>

<div class="container mt-4">

    <h2>Update Product</h2>

    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}

        {{ msg }} <br><br>

        <label>Product ID:</label><br>
        <input type="number" name="product_id" class="form-control"><br>

        <label>Name:</label><br>
        <input type="text" name="name" class="form-control"><br>

        <label>Description:</label><br>
        <textarea name="description" class="form-control"></textarea><br>

        <label>Brand:</label><br>
        <input type="text" name="brand" class="form-control"><br>

        <label>Price:</label><br>
        <input type="number" step="0.01" name="price" class="form-control"><br>

        <label>Discount Price:</label><br>
        <input type="number" step="0.01" name="discount_price" class="form-control"><br>

        <label>Quantity:</label><br>
        <input type="number" name="quantity" class="form-control"><br>

        <label>In Stock:</label>
        <input type="checkbox" name="in_stock"><br><br>

        <label>Category:</label><br>
        <input type="text" name="category" class="form-control"><br>

        <label>Image:</label><br>
        <input type="file" name="image" class="form-control"><br>

        <button class="btn btn-success" type="submit">
            Update Product
        </button>
    </form>

    <hr>

    <div class="row">

        {% for i in updated_product %}
        <div class="col-md-4 col-sm-6 mb-4">

            <div class="card h-100">

                <img src="/media/{{ i.image }}"
                     class="card-img-top"
                     alt="{{ i.name }}"
                     style="height:200px; object-fit:cover;">

                <div class="card-body">
                    <h5 class="card-title">{{ i.name }}</h5>

                    <p>{{ i.description }}</p>

                    <p>
                        <strong>Price:</strong>
                        ₹{{ i.price }}
                    </p>

                    <p>
                        <strong>Brand:</strong>
                        {{ i.brand }}
                    </p>
                </div>

            </div>

        </div>
        {% endfor %}

    </div>

</div>

</body>
</html>
